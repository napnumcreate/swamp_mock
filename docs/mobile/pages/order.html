<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注文管理 - ホストクラブ店内業務システム</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/mockup.css">
  <link rel="stylesheet" href="../assets/css/mobile.css">
</head>
<body>
  <div class="mobile-shell">
    <header class="mobile-header" data-title="注文管理" data-tag-class="tag" data-tag-text="A-01"></header>
    <main class="mobile-body">
      <section class="mobile-section" aria-label="席一覧">
        <h2 class="mobile-section-title">席一覧</h2>
        <article class="mobile-card" data-modal-trigger data-modal-title="A-01 注文登録" style="cursor:pointer;">
          <div class="mobile-list-title"><span>A-01</span><span class="tag">選択中</span></div>
          <p class="mobile-list-meta">客数：3名 / 担当ホスト：REN</p>
        </article>
        <article class="mobile-card" data-modal-trigger data-modal-title="A-02 注文登録" style="cursor:pointer;">
          <div class="mobile-list-title"><span>A-02</span><span class="badge badge-neutral">入店中</span></div>
          <p class="mobile-list-meta">客数：4名 / 担当ホスト：KAITO</p>
        </article>
        <article class="mobile-card" data-modal-trigger data-modal-title="B-01 注文登録" style="cursor:pointer;">
          <div class="mobile-list-title"><span>B-01</span><span class="badge badge-neutral">入店中</span></div>
          <p class="mobile-list-meta">客数：2名 / 担当ホスト：SORA</p>
        </article>
        <article class="mobile-card" data-modal-trigger data-modal-title="B-02 注文登録" style="cursor:pointer;">
          <div class="mobile-list-title"><span>B-02</span><span class="badge badge-warning">会計待ち</span></div>
          <p class="mobile-list-meta">客数：5名 / 担当ホスト：RYU</p>
        </article>
        <article class="mobile-card" data-modal-trigger data-modal-title="C-01 注文登録" style="cursor:pointer;">
          <div class="mobile-list-title"><span>C-01</span><span class="badge badge-neutral">空席</span></div>
          <p class="mobile-list-meta">客数：0名 / 担当ホスト：なし</p>
        </article>
        <article class="mobile-card" data-modal-trigger data-modal-title="VIP-01 注文登録" style="cursor:pointer;">
          <div class="mobile-list-title"><span>VIP-01</span><span class="badge badge-neutral">入店中</span></div>
          <p class="mobile-list-meta">客数：2名 / 担当ホスト：HAYATO</p>
        </article>
      </section>

    </main>
    <div class="mobile-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="mobile-modal">
        <div class="mobile-modal-header">
          <h2 class="mobile-modal-title" id="modal-title"></h2>
          <button class="mobile-modal-close" aria-label="閉じる">&times;</button>
        </div>
        <div class="mobile-modal-body">
          <div class="mobile-btn-row" style="margin-bottom: var(--space-4);">
            <a href="#" class="btn btn-primary">ボトル</a>
            <a href="#" class="btn btn-secondary">グラス</a>
            <a href="#" class="btn btn-secondary">フード</a>
          </div>
          <article class="mobile-card">
            <div class="mobile-list-item">
              <div class="mobile-status-row">
                <div><strong>ドンペリ</strong><p class="mobile-list-meta">&yen;35,000</p></div>
                <a href="#" class="btn btn-primary btn-sm">追加</a>
              </div>
            </div>
            <div class="mobile-list-item">
              <div class="mobile-status-row">
                <div><strong>ジャックダニエル</strong><p class="mobile-list-meta">&yen;8,000</p></div>
                <a href="#" class="btn btn-primary btn-sm">追加</a>
              </div>
            </div>
            <div class="mobile-list-item">
              <div class="mobile-status-row">
                <div><strong>フルーツ盛り合わせ</strong><p class="mobile-list-meta">&yen;3,500</p></div>
                <a href="#" class="btn btn-primary btn-sm">追加</a>
              </div>
            </div>
            <div class="mobile-list-item">
              <div class="mobile-status-row">
                <div><strong>カクテル</strong><p class="mobile-list-meta">&yen;2,000</p></div>
                <a href="#" class="btn btn-primary btn-sm">追加</a>
              </div>
            </div>
          </article>
          <div class="mobile-btn-row" style="margin-top: var(--space-4);">
            <a href="#" class="btn btn-primary">注文確定</a>
          </div>
        </div>
      </div>
    </div>
    <nav class="mobile-bottom-nav" aria-label="メインナビゲーション"></nav>
  </div>
  <script src="../assets/js/mobile-modal.js"></script>
  <script src="../assets/js/shared-mobile-layout.js"></script>
  <script type="module">
    import { requireAuth } from '../../assets/js/auth.js';
    requireAuth('login.html');
  </script>
</body>
</html>
