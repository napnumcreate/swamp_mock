<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup Preview</title>
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/mockup.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-8);
    }
    .welcome-card {
      max-width: 640px;
      width: 100%;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-10) var(--space-8);
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .welcome-icon {
      width: 56px;
      height: 56px;
      background-color: var(--color-accent-light);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-5);
      font-size: 24px;
    }
    .welcome-title {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-3);
    }
    .welcome-desc {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: 1.7;
      margin-bottom: var(--space-8);
    }
    .page-links {
      display: grid;
      gap: var(--space-3);
      text-align: left;
    }
    .page-link-item {
      background-color: var(--color-surface-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }
    .page-link-item a {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-accent);
    }
    .page-link-desc {
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
      margin-top: var(--space-1);
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="welcome-card">
    <div class="welcome-icon">📋</div>
    <h1 class="welcome-title">Mockup Preview</h1>
    <p class="welcome-desc">
      本ページでは、画面イメージ確認用の静的モックを掲載しています。<br>
      表示内容はご確認用のイメージです。実際の機能は動作しません。
    </p>

    <div class="page-links">
      <div class="page-link-item">
        <a href="pages/customer-management.html">顧客管理</a>
        <p class="page-link-desc">来店顧客の情報・来店履歴・ランク管理</p>
      </div>
      <div class="page-link-item">
        <a href="pages/attendance.html">勤怠管理</a>
        <p class="page-link-desc">スタッフの出退勤・勤務時間の確認</p>
      </div>
      <div class="page-link-item">
        <a href="pages/salary-calculation.html">給料計算</a>
        <p class="page-link-desc">ホスト報酬・内勤給与の確認（2026年5月分）</p>
      </div>
      <div class="page-link-item">
        <a href="pages/analytics.html">アナリティクス</a>
        <p class="page-link-desc">売上・来店・ホスト別実績の確認</p>
      </div>
      <div class="page-link-item">
        <a href="mobile/index.html">スマホ画面 (Mobile Mock)</a>
        <p class="page-link-desc">スタッフ向けスマホ画面（客席・付け回し・注文・シフト）</p>
      </div>
    </div>
  </div>
</body>
</html>
