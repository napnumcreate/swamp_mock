<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>所属ホスト一覧 - ホストクラブ店内業務システム</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/mockup.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header" data-title="所属ホスト一覧" data-tag="スタッフ管理"></header>
      <main class="main-content">
        <div class="page-header"><h1 class="page-title">所属ホスト一覧</h1></div>
        <div class="grid-4 section-gap">
          <div class="kpi-card kpi-accent"><div class="kpi-label">在籍ホスト数</div><div class="kpi-value" id="kpi-total-hosts">18名</div><div class="kpi-trend">現在在籍中</div></div>
          <div class="kpi-card"><div class="kpi-label">本日出勤数</div><div class="kpi-value" id="kpi-today-attendance">－</div><div class="kpi-trend">出勤</div></div>
          <div class="kpi-card"><div class="kpi-label">本日売上トップ</div><div class="kpi-value" id="kpi-top-host">－</div><div class="kpi-trend" id="kpi-top-sales">－</div></div>
          <div class="kpi-card"><div class="kpi-label">本日体験入店</div><div class="kpi-value" id="kpi-new-hosts">－</div><div class="kpi-trend">本日体験中</div></div>
        </div>
        <div class="card section-gap">
          <div class="card-header">
            <span class="card-title">ホスト一覧</span>
          </div>
          <div class="table-wrapper">
            <table class="table" id="host-table">
              <thead>
                <tr>
                  <th>ホスト名</th>
                  <th>役職</th>
                  <th>今月売上</th>
                  <th>今月出勤日数</th>
                  <th>本日のシフト</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div id="host-modal">
          <div class="card host-modal-card">
            <div class="card-header">
              <span class="card-title">ホスト詳細</span>
              <button id="host-modal-close" class="btn btn-ghost btn-sm" type="button">✕</button>
            </div>
            <div class="card-body">
              <div class="detail-row"><span class="detail-label">ホスト名</span><span class="detail-value" id="host-modal-name"></span></div>
              <div class="detail-row"><span class="detail-label">役職</span><span class="detail-value" id="host-modal-rank"></span></div>
              <div class="detail-row"><span class="detail-label">今月売上</span><span class="detail-value" id="host-modal-monthly-sales"></span></div>
              <div class="detail-row"><span class="detail-label">今月出勤日数</span><span class="detail-value" id="host-modal-monthly-attendance"></span></div>
              <div class="detail-row"><span class="detail-label">本日のシフト</span><span class="detail-value" id="host-modal-today-shift"></span></div>
              <div class="detail-row"><span class="detail-label">本日売上</span><span class="detail-value" id="host-modal-today-sales"></span></div>
              <div class="detail-row"><span class="detail-label">本日来客数</span><span class="detail-value" id="host-modal-guests"></span></div>
              <div class="detail-row"><span class="detail-label">本日指名数</span><span class="detail-value" id="host-modal-nominations"></span></div>
              <div class="detail-row"><span class="detail-label">同伴</span><span class="detail-value" id="host-modal-dohan"></span></div>
              <div class="detail-row"><span class="detail-label">アフター</span><span class="detail-value" id="host-modal-after"></span></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="../assets/mock/hosts.js"></script>
  <script src="../assets/mock/sales-report.js"></script>
  <script src="script.js"></script>
  <script src="host-list.js"></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    requireAuth('login.html');
  </script>
  <script src="../assets/js/shared-layout.js"></script>
</body>
</html>
