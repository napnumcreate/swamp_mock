<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客管理 - SWAMP店内業務システム</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/mockup.css">
  <link rel="stylesheet" href="style.css">
  <style>body{visibility:hidden}</style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header" data-title="顧客管理" data-tag="営業管理"></header>
      <main class="main-content">
        <div class="page-header"><h1 class="page-title">顧客管理</h1></div>
        <div class="grid-4 section-gap">
          <div class="kpi-card kpi-accent"><div class="kpi-label">総顧客数</div><div class="kpi-value">248名</div><div class="kpi-trend">直近一年間で来店した顧客数</div></div>
          <div class="kpi-card"><div class="kpi-label">今月の新規顧客</div><div class="kpi-value">12名</div><div class="kpi-trend">2026年5月</div></div>
          <div class="kpi-card"><div class="kpi-label">今月の初リピート顧客</div><div class="kpi-value">34名</div><div class="kpi-trend">2026年5月</div></div>
          <div class="kpi-card"><div class="kpi-label">本日来店した顧客</div><div class="kpi-value">20名</div><div class="kpi-trend">2026年5月24日</div></div>
        </div>
        <div class="card section-gap">
          <div class="card-header">
            <span class="card-title">顧客一覧</span>
          </div>
          <div class="table-wrapper">
            <table class="table" id="customer-table">
              <thead>
                <tr>
                  <th>顧客名</th>
                  <th>担当ホスト</th>
                  <th>初来店日</th>
                  <th>初リピート日</th>
                  <th>来店回数</th>
                  <th>平均来店頻度</th>
                  <th>今月の売上</th>
                  <th>総売上</th>
                  <th>備考</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div id="customer-pagination" class="pagination-bar"></div>
        </div>
        <div id="customer-modal" class="cm-variant">
          <div class="card customer-modal-card">
            <div class="card-header">
              <span class="card-title" id="modal-title">顧客詳細</span>
              <button id="modal-close" class="btn btn-ghost btn-sm" type="button">✕</button>
            </div>
            <div class="card-body">
              <div class="detail-row"><span class="detail-label">顧客名</span><span class="detail-value" id="modal-name"></span></div>
              <div class="detail-row"><span class="detail-label">担当</span><span class="detail-value" id="modal-host"></span></div>
              <div class="detail-row"><span class="detail-label">来店回数</span><span class="detail-value" id="modal-visit-count"></span></div>
              <div class="detail-row"><span class="detail-label">平均来店頻度</span><span class="detail-value" id="modal-visit-freq"></span></div>
              <div class="detail-row"><span class="detail-label">今月の売上</span><span class="detail-value" id="modal-monthly-sales"></span></div>
              <div class="detail-row"><span class="detail-label">総売上</span><span class="detail-value" id="modal-total-sales"></span></div>
              <div class="detail-row"><span class="detail-label">初来店日</span><span class="detail-value" id="modal-first-visit"></span></div>
              <div class="detail-row"><span class="detail-label">初リピート日</span><span class="detail-value" id="modal-first-repeat"></span></div>
              <div class="detail-row"><span class="detail-label">備考</span><span class="detail-value" id="modal-notes"></span></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="script.js"></script>
  <script src="../assets/mock/customer.js"></script>
  <script src="customer-management.js"></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    requireAuth('login.html');
  </script>
  <script src="../assets/js/shared-layout.js"></script>
</body>
</html>
