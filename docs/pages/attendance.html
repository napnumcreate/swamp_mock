<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>勤怠管理 - ホストクラブ店舗業務システム</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/mockup.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header" data-title="勤怠管理" data-tag="本日"></header>
      <main class="main-content">
        <div class="page-header">
          <h1 class="page-title">勤怠管理</h1>
        </div>
        <div class="card section-gap filter-card">
          <div class="filter-row">
            <span class="filter-row-label">日付</span>
            <div class="date-nav">
              <button type="button" class="btn btn-secondary btn-sm" id="prev-day">前日</button>
              <span class="date-nav-label" id="date-label">2026/05/24</span>
              <button type="button" class="btn btn-secondary btn-sm" id="today-btn">本日</button>
              <button type="button" class="btn btn-secondary btn-sm" id="next-day">翌日</button>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-row-label">表示時間</span>
            <div class="time-filter-bar">
              <select id="filter-start" class="select-sm"></select>
              <span class="time-filter-sep">〜</span>
              <select id="filter-end" class="select-sm"></select>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-row-label">スタッフ</span>
            <div class="filter-badges" id="staff-display-filter">
              <span class="tag filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-staff="all">全スタッフ</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-staff="scheduled">本日出勤予定</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-staff="working">現在出勤中</span>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-row-label">役職</span>
            <div class="filter-badges" id="role-filter">
              <span class="tag filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-role="all">すべて</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-role="with-title">役職あり</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-role="no-title">役職なし</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-role="naikan">内勤</span>
            </div>
          </div>
        </div>
        <div class="card section-gap calendar-card">
          <div class="calendar-scroll">
            <div class="calendar-header-row" id="calendar-header">
              <!-- JS が挿入 -->
            </div>
            <div class="calendar-body" id="calendar-body">
              <!-- JS が挿入 -->
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="../assets/mock/attendance.js"></script>
  <script src="attendance.js"></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    requireAuth('login.html');
  </script>
  <script src="../assets/js/shared-layout.js"></script>
</body>
</html>
