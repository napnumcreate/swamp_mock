<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - ホストクラブ店内業務システム</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/mockup.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header" data-title="ダッシュボード" data-tag="本日"></header>
      <main class="main-content">
        <div class="page-header"><h1 class="page-title">ダッシュボード</h1></div>
        <div class="grid-4 section-gap">
          <div class="kpi-card kpi-accent"><div class="kpi-label">本日売上</div><div class="kpi-value">&yen;840,000</div><div class="kpi-trend kpi-trend--up">営業速報</div></div>
          <div class="kpi-card"><div class="kpi-label">今月売上</div><div class="kpi-value">&yen;18,240,000</div><div class="kpi-trend">5月累計</div></div>
          <div class="kpi-card"><div class="kpi-label">今月来店数</div><div class="kpi-value">186組</div><div class="kpi-trend">来店実績</div></div>
          <div class="kpi-card"><div class="kpi-label">客単価</div><div class="kpi-value">&yen;98,000</div><div class="kpi-trend">平均金額</div></div>
        </div>
        <div class="card section-gap">
          <div class="card-header"><span class="card-title">店舗状況</span><div class="btn-group"><span class="tag filter-btn" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-filter="all">すべて (20)</span><span class="tag tag-gray filter-btn" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-filter="active">在店中 (18)</span><span class="tag tag-gray filter-btn" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-filter="exited">退店済み (2)</span></div></div>
          <div class="table-wrapper">
            <table class="table" id="visit-table">
              <thead><tr><th>顧客名</th><th>担当ホスト</th><th>座席</th><th>入店時間</th><th>退店時間</th><th>現在の売上</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div class="card section-gap filter-card">
          <div class="filter-row">
            <span class="filter-row-label">日付</span>
            <div class="date-nav">
              <button type="button" class="btn btn-secondary btn-sm" id="prev-day">前日</button>
              <span class="date-nav-label" id="date-label">2026/05/26</span>
              <button type="button" class="btn btn-secondary btn-sm" id="today-btn">本日</button>
              <button type="button" class="btn btn-secondary btn-sm" id="next-day">翌日</button>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-row-label">表示時間</span>
            <div class="time-filter-bar">
              <select id="filter-start" class="select-sm"></select>
              <span class="time-filter-sep">〜</span>
              <select id="filter-end" class="select-sm"></select>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-row-label">スタッフ</span>
            <div class="filter-badges" id="staff-display-filter">
              <span class="tag filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-staff="all">全スタッフ</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-staff="scheduled">本日出勤予定</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-staff="working">現在出勤中</span>
            </div>
          </div>
          <div class="filter-row">
            <span class="filter-row-label">役職</span>
            <div class="filter-badges" id="role-filter">
              <span class="tag filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-role="all">すべて</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-role="with-title">役職あり</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-role="no-title">役職なし</span>
              <span class="tag tag-gray filter-badge" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-role="naikan">内勤</span>
            </div>
          </div>
        </div>
        <div class="card section-gap calendar-card">
          <div class="calendar-scroll">
            <div class="calendar-header-row" id="calendar-header">
              <!-- JS が挿入 -->
            </div>
            <div class="calendar-body" id="calendar-body">
              <!-- JS が挿入 -->
            </div>
          </div>
        </div>
        <div id="customer-modal">
          <div class="card customer-modal-card">
            <div class="card-header">
              <span class="card-title" id="modal-title">顧客詳細</span>
              <button id="modal-close" class="btn btn-ghost btn-sm" type="button">✕</button>
            </div>
            <div class="card-body">
              <div class="detail-row"><span class="detail-label">顧客名</span><span class="detail-value" id="modal-name"></span></div>
              <div class="detail-row"><span class="detail-label">担当</span><span class="detail-value" id="modal-host"></span></div>
              <div class="detail-row"><span class="detail-label">初来店日</span><span class="detail-value" id="modal-first-visit"></span></div>
              <div class="detail-row"><span class="detail-label">初リピート日</span><span class="detail-value" id="modal-first-repeat"></span></div>
              <div class="detail-row"><span class="detail-label">来店回数</span><span class="detail-value" id="modal-visit-count"></span></div>
              <div class="detail-row"><span class="detail-label">平均来店頻度</span><span class="detail-value" id="modal-visit-freq"></span></div>
              <div class="detail-row"><span class="detail-label">今月の売上</span><span class="detail-value" id="modal-monthly-sales"></span></div>
              <div class="detail-row"><span class="detail-label">総売上</span><span class="detail-value" id="modal-total-sales"></span></div>
              <div class="detail-row"><span class="detail-label">備考</span><span class="detail-value" id="modal-notes"></span></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="../assets/mock/attendance.js"></script>
  <script src="attendance.js"></script>
  <script src="script.js"></script>
  <script src="../assets/mock/customer.js"></script>
  <script src="dashboard.js"></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    requireAuth('login.html');
  </script>
  <script src="../assets/js/shared-layout.js"></script>
</body>
</html>
