<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - ホストクラブ店内業務システム</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/mockup.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header" data-title="ダッシュボード" data-tag="本日"></header>
      <main class="main-content">
        <div class="page-header"><h1 class="page-title">ダッシュボード</h1></div>
        <div class="card section-gap">
          <div class="card-header"><span class="card-title">店舗状況</span><div class="btn-group"><span class="tag filter-btn" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-filter="all">すべて (20)</span><span class="tag tag-gray filter-btn" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-filter="active">在店中 (18)</span><span class="tag tag-gray filter-btn" style="cursor:pointer; border-radius:9999px; border:1px solid currentColor;" data-filter="exited">退店済み (2)</span></div></div>
          <div class="table-wrapper">
            <table class="table" id="visit-table">
              <thead><tr><th>顧客名</th><th>担当ホスト</th><th>座席</th><th>入店時間</th><th>退店時間</th><th>現在の売上</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div id="customer-modal">
          <div class="card customer-modal-card">
            <div class="card-header">
              <span class="card-title" id="modal-title">顧客詳細</span>
              <button id="modal-close" class="btn btn-ghost btn-sm" type="button">✕</button>
            </div>
            <div class="card-body">
              <div class="detail-row"><span class="detail-label">顧客名</span><span class="detail-value" id="modal-name"></span></div>
              <div class="detail-row"><span class="detail-label">担当</span><span class="detail-value" id="modal-host"></span></div>
              <div class="detail-row"><span class="detail-label">初来店日</span><span class="detail-value" id="modal-first-visit"></span></div>
              <div class="detail-row"><span class="detail-label">初リピート日</span><span class="detail-value" id="modal-first-repeat"></span></div>
              <div class="detail-row"><span class="detail-label">来店回数</span><span class="detail-value" id="modal-visit-count"></span></div>
              <div class="detail-row"><span class="detail-label">平均来店頻度</span><span class="detail-value" id="modal-visit-freq"></span></div>
              <div class="detail-row"><span class="detail-label">今月の売上</span><span class="detail-value" id="modal-monthly-sales"></span></div>
              <div class="detail-row"><span class="detail-label">総売上</span><span class="detail-value" id="modal-total-sales"></span></div>
              <div class="detail-row"><span class="detail-label">備考</span><span class="detail-value" id="modal-notes"></span></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="script.js"></script>
  <script src="../assets/mock/customer.js"></script>
  <script src="dashboard.js"></script>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    requireAuth('login.html');
  </script>
  <script src="../assets/js/shared-layout.js"></script>
</body>
</html>
