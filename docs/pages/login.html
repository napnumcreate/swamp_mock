<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 店舗管理システム</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/mockup.css">
  <style>
    body {
      margin: 0;
      background-color: var(--color-bg);
    }

    .login-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    .login-brand-panel {
      background-color: var(--color-accent-light);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-12) var(--space-10);
      position: relative;
    }

    .login-brand-label {
      position: absolute;
      top: var(--space-6);
      left: var(--space-6);
    }

    .login-brand-label .label-provisional {
      margin-left: 0;
    }

    .login-brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background-color: var(--color-accent);
      color: #fff;
      border-radius: var(--radius-lg);
      font-size: var(--font-size-lg);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-5);
    }

    .login-brand-name {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-3);
    }

    .login-brand-tagline {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      line-height: 1.7;
      margin-bottom: var(--space-8);
    }

    .login-brand-note {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      margin-top: auto;
      padding-top: var(--space-8);
    }

    .login-form-panel {
      background-color: var(--color-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-10) var(--space-8);
    }

    .login-form-inner {
      width: 100%;
      max-width: 400px;
    }

    .login-form-title {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }

    .login-form-subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-5);
    }

    .login-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: var(--space-6);
    }

    .login-error[hidden] {
      display: none;
    }

    @media (max-width: 768px) {
      .login-split {
        grid-template-columns: 1fr;
      }

      .login-brand-panel {
        padding: var(--space-12) var(--space-6) var(--space-8);
      }

      .login-form-panel {
        padding: var(--space-8) var(--space-5);
      }
    }
  </style>
</head>
<body>
  <main class="login-split">
    <section class="login-brand-panel">
      <div class="login-brand-label">
        <span class="label-provisional">静的モック</span>
      </div>
      <div>
        <div class="login-brand-logo">店</div>
        <h1 class="login-brand-name">店舗管理システム</h1>
        <p class="login-brand-tagline">顧客管理・勤怠管理・給料計算・アナリティクスなど、<br>店舗運営に必要な機能をひとつの画面でご確認いただけます。</p>
      </div>
      <p class="login-brand-note">安全な接続 &middot; デモ環境</p>
    </section>

    <section class="login-form-panel">
      <div class="login-form-inner">
        <h2 class="login-form-title">ログイン</h2>
        <p class="login-form-subtitle">アクセスコードとパスワードを入力してください。</p>
        <form class="card" id="login-form">
          <div class="form-group">
            <label class="form-label" for="access-code">アクセスコード</label>
            <input class="form-input" id="access-code" name="access-code" type="password" autocomplete="off">
          </div>

          <div class="form-group">
            <label class="form-label" for="password">パスワード</label>
            <input class="form-input" id="password" name="password" type="password" autocomplete="off">
          </div>

          <div class="alert alert-danger login-error" id="login-error" hidden>
            <div class="alert-body">アクセスコードまたはパスワードが一致しません。</div>
          </div>

          <div class="login-actions">
            <button class="btn btn-primary" type="submit">ログイン</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
