<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>データ管理 - ホストクラブ店内業務システム</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/mockup.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-wrapper">
      <header class="header" data-title="データ管理" data-tag="システム管理"></header>
      <main class="main-content">
        <div class="page-header"><h1 class="page-title">データ管理</h1></div>
        <div class="grid-4 section-gap">
          <div class="kpi-card kpi-accent"><div class="kpi-label">総データ件数</div><div class="kpi-value">顧客248件 / ホスト18件</div></div>
          <div class="kpi-card"><div class="kpi-label">最終バックアップ</div><div class="kpi-value">2026年5月25日</div><div class="kpi-trend">23:00</div></div>
          <div class="kpi-card"><div class="kpi-label">ストレージ使用量</div><div class="kpi-value">12.4 GB / 50 GB</div></div>
          <div class="kpi-card"><div class="kpi-label">今月のエクスポート数</div><div class="kpi-value">7回</div></div>
        </div>
        <div class="grid-2 section-gap">
          <div class="card">
            <div class="card-header">
              <span class="card-title">マスターデータ管理</span>
            </div>
            <div class="card-body">
              <div class="detail-row"><span class="detail-label">ホストデータ</span><button type="button" class="btn btn-secondary">エクスポート</button></div>
              <div class="detail-row"><span class="detail-label">顧客データ</span><button type="button" class="btn btn-secondary">エクスポート</button></div>
              <div class="detail-row"><span class="detail-label">売上データ</span><button type="button" class="btn btn-secondary">エクスポート</button></div>
              <div class="detail-row"><span class="detail-label">シフトデータ</span><button type="button" class="btn btn-secondary">エクスポート</button></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">バックアップ・メンテナンス</span>
            </div>
            <div class="card-body">
              <div class="detail-row"><span class="detail-label">バックアップ</span><button type="button" class="btn btn-secondary">手動バックアップ実行</button></div>
              <div class="detail-row"><span class="detail-label">テストデータ</span><button type="button" class="btn btn-secondary">データクリア（テスト用）</button></div>
              <div class="detail-row"><span class="detail-label">データ取込</span><button type="button" class="btn btn-secondary">CSVインポート</button></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script type="module">
    import { requireAuth } from '../assets/js/auth.js';
    requireAuth('login.html');
  </script>
  <script src="../assets/js/shared-layout.js"></script>
</body>
</html>
